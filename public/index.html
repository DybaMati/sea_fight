<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sea Fight</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="hud">
      <div id="name"></div>
      <div id="stats"></div>
      <div id="coords"></div>
      <div id="target"></div>
      <div class="help">W/S - przod/tyl, A/D - skret, rolka lub +/- zoom, kliknij cel i uzyj paska akcji</div>
    </div>
    <div class="action-bar">
      <button id="attackBtn">Atak</button>
      <button id="healBtn">Uleczenie</button>
      <button id="otherBtn" disabled>Inne</button>
    </div>
    <canvas id="game" width="1200" height="700"></canvas>
    <script src="/client.js"></script>
  </body>
</html>
